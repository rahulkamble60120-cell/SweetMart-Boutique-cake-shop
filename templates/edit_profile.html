<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile | SweetMart</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --choc-brown: #3D2B1F; --pink-accent: #FF85A2; --cream-text: #FFFDF5; --card-inner: #4A3728; }
        body { background: var(--choc-brown); font-family: 'Quicksand', sans-serif; color: var(--cream-text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .edit-card { background: var(--card-inner); padding: 40px; border-radius: 40px; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.05); }
        h2 { font-family: 'Fredoka', sans-serif; color: var(--pink-accent); text-align: center; margin-bottom: 30px; }
        
        label { display: block; margin-bottom: 8px; font-size: 0.8rem; opacity: 0.7; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; box-sizing: border-box; font-family: 'Quicksand', sans-serif; }
        
        .btn-save { width: 100%; background: var(--pink-accent); color: white; padding: 15px; border-radius: 50px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-save:hover { transform: scale(1.02); background: #ffabbf; }
        .cancel-link { display: block; text-align: center; margin-top: 15px; color: white; text-decoration: none; opacity: 0.6; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="edit-card">
        <h2>Edit <span>Profile</span></h2>
        <form method="POST">
            <label>Full Name</label>
            <input type="text" name="name" value="{{ user.name }}" required>
            
            <label>Email Address</label>
            <input type="email" name="email" value="{{ user.email }}" required>
            
            <label>Shipping Address</label>
            <textarea name="address" rows="3">{{ user.address if user.address }}</textarea>
            
            <button type="submit" class="btn-save">Save Changes</button>
            <a href="/profile" class="cancel-link">Cancel</a>
        </form>
    </div>
</body>
</html>
