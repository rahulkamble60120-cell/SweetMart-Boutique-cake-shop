<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | SweetMart Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --choc-brown: #2D1B0E; --pink-accent: #FF85A2; --cream-text: #FFFDF5; }
        body { 
            margin: 0; background-color: var(--choc-brown); 
            color: white; font-family: 'Quicksand'; 
            height: 100vh; display: grid; place-items: center; 
        }
        .login-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 50px;
            border-radius: 50px; width: 100%; max-width: 380px; text-align: center;
        }
        h1 { font-family: 'Fredoka'; color: var(--pink-accent); font-size: 2.5rem; margin-top: 0; }
        input {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2);
            color: white; outline: none; box-sizing: border-box;
        }
        .btn-login {
            width: 100%; padding: 15px; border-radius: 50px; border: none;
            background: var(--pink-accent); color: white; font-weight: bold;
            cursor: pointer; margin-top: 20px; transition: 0.3s;
        }
        .btn-login:hover { background: #FF97B2; transform: translateY(-3px); }

        /* NEON GLOW EFFECT */
        .register-text { margin-top: 25px; font-size: 0.9rem; opacity: 0.7; }
        .join-link {
            color: var(--pink-accent);
            text-decoration: none;
            font-weight: bold;
            transition: all 0.4s ease;
            display: inline-block;
        }
        .join-link:hover {
            color: #fff;
            text-shadow: 0 0 8px var(--pink-accent), 0 0 15px var(--pink-accent), 0 0 20px var(--pink-accent);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Sweet<span>Mart</span></h1>
        <p style="opacity:0.6; margin-bottom: 30px;">Welcome Back</p>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}{% for m in messages %}
            <p style="color: var(--pink-accent); font-size: 0.8rem;">{{ m }}</p>
          {% endfor %}{% endif %}
        {% endwith %}

        <form method="POST">
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn-login">Login</button>
        </form>

        <p class="register-text">
            New here? <a href="{{ url_for('register') }}" class="join-link">Join SweetMart</a>
        </p>
    </div>
</body>
</html>
