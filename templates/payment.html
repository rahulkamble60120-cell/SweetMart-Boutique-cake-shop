<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SweetMart | Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #2D1B0E; color: white; font-family: 'Quicksand'; display: grid; place-items: center; height: 100vh; margin: 0; }
        .payment-box { background: #3D2B1F; padding: 40px; border-radius: 30px; border: 1px solid #FF85A2; text-align: center; max-width: 400px; width: 90%; }
        .price { font-size: 2.5rem; color: #FF85A2; margin: 20px 0; font-weight: bold; }
        .btn-pay { background: #FF85A2; color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-size: 1.1rem; width: 100%; transition: 0.3s; }
        .btn-pay:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="payment-box">
        <h2>Secure Checkout</h2>
        <p>You have selected Online Payment.</p>
        <div class="price">₹{{ total }}</div>
        
        <button class="btn-pay" onclick="processPayment()">Complete Payment</button>
        
        <p style="margin-top: 20px; font-size: 0.8rem; opacity: 0.6;">Your order will not be saved until payment is successful.</p>
    </div>

    <script>
        function processPayment() {
            alert("Payment successful! Redirecting...");
            window.location.href = "{{ url_for('confirm_order') }}";
        }
    </script>
</body>
</html>
