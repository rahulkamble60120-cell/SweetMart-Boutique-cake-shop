<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist | SweetMart</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --choc: #2D1B0E; --pink: #FF85A2; --glass: rgba(255, 255, 255, 0.04);
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(40px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        body { 
            margin: 0; font-family: 'Quicksand', sans-serif; background: var(--choc); 
            color: white; min-height: 100vh; overflow-x: hidden;
        }

        /* Unique Split Layout */
        .page-wrapper {
            display: grid;
            grid-template-columns: 350px 1fr;
            max-width: 1100px;
            margin: 0 auto;
            padding: 60px 20px;
            gap: 50px;
        }

        /* Left Side: Sticky Info */
        .wish-sidebar {
            position: sticky;
            top: 60px;
            height: fit-content;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 40px;
            text-align: center;
            backdrop-filter: blur(20px);
        }

        .wish-sidebar h1 { font-family: 'Fredoka'; font-size: 2.5rem; margin: 0; color: var(--pink); }
        .wish-count-big { font-family: 'Fredoka'; font-size: 5rem; line-height: 1; margin: 20px 0; opacity: 0.2; }
        
        /* Right Side: Floating Stack */
        .stack-container { display: flex; flex-direction: column; gap: 20px; }

        .wish-stack-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 25px;
            transition: var(--transition);
            animation: slideInUp 0.7s backwards;
        }

        .wish-stack-card:hover {
            background: rgba(255,255,255,0.08);
            transform: scale(1.03) translateX(10px);
            border-color: var(--pink);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .cake-img-wrap {
            width: 120px; height: 120px;
            border-radius: 20px;
            overflow: hidden;
            flex-shrink: 0;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .cake-img-wrap img { width: 100%; height: 100%; object-fit: cover; }

        .cake-meta { flex-grow: 1; }
        .cake-meta h3 { font-family: 'Fredoka'; font-size: 1.4rem; margin: 0; }
        .cake-meta p { color: var(--pink); font-weight: 800; font-size: 1.3rem; margin: 5px 0 0; }

        /* Smooth Action Buttons */
        .action-btns { display: flex; flex-direction: column; gap: 10px; }
        
        .btn-add-cart {
            background: var(--pink); color: white; border: none;
            padding: 12px 25px; border-radius: 15px; font-weight: 700;
            cursor: pointer; transition: 0.3s;
        }
        .btn-add-cart:hover { filter: brightness(1.1); transform: translateY(-3px); }

        .btn-remove-link {
            background: none; border: none; color: white; opacity: 0.4;
            cursor: pointer; font-size: 0.8rem; text-decoration: underline;
        }
        .btn-remove-link:hover { opacity: 1; color: #ff4d4d; }

        /* Motion Removal */
        .vanish { transform: scale(0.8) translateX(100px); opacity: 0; }

        @media (max-width: 900px) {
            .page-wrapper { grid-template-columns: 1fr; }
            .wish-sidebar { position: relative; top: 0; margin-bottom: 30px; }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <aside class="wish-sidebar">
            <h1>My <span>Gems</span></h1>
            <div class="wish-count-big" id="total-count">{{ cakes|length }}</div>
            <p style="opacity: 0.6;">Your handpicked selection of artisanal delights.</p>
            <a href="/" style="display: inline-block; margin-top: 30px; color: var(--pink); text-decoration: none; font-weight: 700;">
                <i class="fas fa-plus"></i> Add More
            </a>
        </aside>

        <main class="stack-container">
            {% if not cakes %}
                <div style="text-align: center; padding: 100px 0; opacity: 0.4;">
                    <i class="fas fa-heart-broken" style="font-size: 3rem; margin-bottom: 20px;"></i>
                    <p>No favorites yet.</p>
                </div>
            {% endif %}

            {% for cake in cakes %}
            <div class="wish-stack-card" id="card-{{ cake.cake_id }}" style="animation-delay: {{ loop.index0 * 0.1 }}s;">
                <div class="cake-img-wrap">
                    <img src="{{ url_for('static', filename=cake.image_file) }}" alt="{{ cake.name }}">
                </div>
                
                <div class="cake-meta">
                    <h3>{{ cake.name }}</h3>
                    <p>₹{{ cake.price }}</p>
                </div>

                <div class="action-btns">
                    <button class="btn-add-cart" onclick="addToCart({{ cake.cake_id }})">Move to Cart</button>
                    <button class="btn-remove-link" onclick="removeGem({{ cake.cake_id }})">Remove</button>
                </div>
            </div>
            {% endfor %}
        </main>
    </div>

    <script>
        function removeGem(cid) {
            const card = document.getElementById(`card-${cid}`);
            const countEl = document.getElementById('total-count');
            
            fetch(`/toggle_wishlist/${cid}`, { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                if (data.action === 'removed') {
                    card.classList.add('vanish');
                    setTimeout(() => {
                        card.remove();
                        countEl.innerText = document.querySelectorAll('.wish-stack-card').length;
                        if (document.querySelectorAll('.wish-stack-card').length === 0) location.reload();
                    }, 500);
                }
            });
        }

        function addToCart(cid) {
            fetch(`/add_to_cart/${cid}`, { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                alert("The masterpiece is now in your cart! 🍰");
            });
        }
    </script>
</body>
</html>
